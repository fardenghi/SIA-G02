name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  pytest:
    name: pytest (tp2)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tp2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        # Nota: no instalamos el extra 'gpu' (moderngl) — los runners de GitHub
        # no tienen display ni GPU, y el test GPU ya hace skip si moderngl
        # no está disponible.
        run: uv sync --dev

      - name: Run pytest
        run: uv run pytest
