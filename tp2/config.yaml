# Configuración por defecto del algoritmo genético
# Estos valores pueden ser sobreescritos por argumentos CLI

# Imagen
image:
  # Ruta a la imagen objetivo (requerido en CLI)
  target_path: null

# Parámetros del genotipo
genotype:
  # Cantidad de triángulos por individuo
  num_triangles: 50
  # Rango de valores para el canal alfa (0.0 - 1.0)
  alpha_min: 0.1
  alpha_max: 0.8

# Parámetros del algoritmo genético
genetic:
  # Tamaño de la población
  population_size: 100
  # Número máximo de generaciones
  max_generations: 10000
  # Umbral de fitness para parada temprana. Depende del método de fitness:
  #   linear             → 1 - MSE/65025  ∈ [0,1]  ej: 0.92 ≈ error promedio ~67/canal
  #   rmse               → 1 - sqrt(MSE)/255 ∈ [0,1]
  #   inverse_normalized → 1 / (1 + MSE/65025) ∈ (0.5,1]
  #   exponential        → exp(-NMSE/scale) ∈ (0,1]
  #   inverse_mse        → 1 / (1 + MSE)  ∈ (0,0.003]  (NO recomendado)
  # null = sin parada temprana, corre hasta max_generations
  fitness_threshold: null
  
# Fitness
fitness:
  # Función de fitness:
  #   linear             → 1 - MSE/65025           [0, 1]  recomendado, lineal
  #   rmse               → 1 - sqrt(MSE)/255        [0, 1]  penaliza menos errores grandes
  #   inverse_normalized → 1 / (1 + MSE/65025)      (0.5, 1]  más discriminativo cerca de 1
  #   exponential        → exp(-MSE_norm / scale)   (0, 1]  escala configurable
  #   inverse_mse        → 1 / (1 + MSE)            (0, 0.003]  NO recomendado
  #   detail_weighted    → MSE ponderado por bordes  [0, 1]  upweightea regiones con detalle;
  #                         útil cuando hay fondo liso + símbolo pequeño
  method: "inverse_normalized"
  # Escala para método exponencial (menor = curva más pronunciada)
  exponential_scale: 0.1
  # Peso base para regiones lisas en detail_weighted.
  # 0.0 = solo pesan los bordes; 1.0 = equivalente a MSE uniforme.
  # Recomendado: 0.2–0.4 para imágenes con fondo dominante + símbolo pequeño.
  detail_weight_base: 0.3

# Selección
selection:
  # Método: "elite", "tournament", "probabilistic_tournament", "roulette", "universal", "boltzmann", "rank" (alias: "ranking")
  method: "boltzmann"
  # Tamaño del torneo determinístico
  tournament_size: 3
  # Umbral para torneo probabilístico (0.5 - 1.0)
  threshold: 0.75
  # Parámetros de Boltzmann
  boltzmann_t0: 100.0
  boltzmann_tc: 1.0
  boltzmann_k: 0.005

# Cruza (Crossover)
crossover:
  # Método: "single_point", "two_point", "uniform", "annular"
  method: "uniform"
  # Probabilidad de cruza
  probability: 0.8

# Mutación
mutation:
  # Método: "single_gene"        → muta exactamente 1 triángulo
  #         "limited_multigen"   → muta entre 1 y max_genes triángulos
  #         "uniform_multigen"   → cada triángulo muta independientemente con gene_probability
  #         "complete"           → muta todos los triángulos
  #         "error_map_guided"   → sesga la mutación hacia triángulos en zonas con mayor error
  method: "uniform_multigen"
  # Probabilidad de mutar un individuo (Pm) — usado por single_gene, limited_multigen, complete
  probability: 0.3
  # Probabilidad de mutar cada gen (triángulo) — usado por uniform_multigen
  gene_probability: 0.1
  # Máximo de genes a mutar — usado por limited_multigen
  max_genes: 3
  # Magnitud máxima de perturbación en coordenadas (fracción del tamaño)
  position_delta: 0.1
  # Magnitud máxima de perturbación en color (0-255)
  color_delta: 30
  # Magnitud máxima de perturbación en alfa
  alpha_delta: 0.1
  # Fracción de mutaciones guiadas por error map (solo para error_map_guided).
  # El resto (1 - guided_ratio) son mutaciones uniformes aleatorias para mantener diversidad.
  # Rango: [0.0, 1.0]. Recomendado: 0.7–0.8.
  guided_ratio: 0.75

  # Sigma adaptativo: escala los deltas según el progreso real del fitness.
  # Si hay estancamiento → reduce los deltas (refina).
  # Si hay mejoras reales → los recupera (explora).
  adaptive_sigma_enabled: true
  # Ventana de generaciones a observar para detectar estancamiento
  adaptive_sigma_window: 30
  # Mejora mínima en la ventana para no considerarse estancamiento
  adaptive_sigma_min_improvement: 0.0001
  # Factor de decaimiento cuando hay estancamiento (< 1)
  adaptive_sigma_decay_factor: 0.9
  # Factor de recuperación cuando hay mejoras (> 1)
  adaptive_sigma_recovery_factor: 1.1
  # Escala mínima permitida (piso de refinamiento)
  adaptive_sigma_scale_min: 0.1
  # Escala máxima permitida y valor inicial (techo de exploración)
  adaptive_sigma_scale_max: 1.0

# Supervivencia
survival:
  # Estrategia: "additive" (padres + hijos compiten) o "exclusive" (hijos tienen prioridad)
  method: "additive"
  # Método de selección para elegir sobrevivientes
  selection_method: "elite"
  # Ratio de hijos a generar: K = N * offspring_ratio (1.0 = misma cantidad, 1.5 = 50% más)
  offspring_ratio: 1.0

# Salida y visualización
output:
  # Directorio de salida
  directory: "output"
  # Guardar imagen cada N generaciones (0 = solo al final)
  save_interval: 100
  # Mostrar progreso en consola cada N generaciones
  log_interval: 10
  # Exportar datos de triángulos (JSON)
  export_triangles: true
  # Generar gráfico de evolución del fitness
  plot_fitness: true
  # Exportar métricas por generación a CSV (pandas) — útil para comparar corridas
  export_metrics_csv: true
  # Exportar enumeración de triángulos a CSV (una fila por triángulo)
  export_triangles_csv: false

# Backend de renderizado
rendering:
  # "cpu" = Pillow (siempre disponible, default)
  # "gpu" = moderngl/OpenGL (requiere: pip install moderngl  o  uv sync --extra gpu)
  backend: "gpu"
